name: Deploy Edge Functions — Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy All Edge Functions
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy chat function
        run: |
          supabase functions deploy chat \
            --project-ref $SUPABASE_PROJECT_ID
        continue-on-error: false

      - name: Deploy meet function
        run: |
          supabase functions deploy meet \
            --project-ref $SUPABASE_PROJECT_ID
        continue-on-error: false

      - name: Deploy calendar function
        run: |
          supabase functions deploy calendar \
            --project-ref $SUPABASE_PROJECT_ID
        continue-on-error: false

      - name: Deployment summary
        run: |
          echo "✅ Edge Functions déployées"
          echo "Projet : $SUPABASE_PROJECT_ID"

