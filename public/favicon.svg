<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="8" fill="#0B0F14" />

  <!-- Lettre A stylisée (Space Grotesk) -->
  <!-- Trait gauche du A -->
  <line x1="8" y1="26" x2="16" y2="6" stroke="#E08A3E" stroke-width="3" stroke-linecap="round" />
  <!-- Trait droit du A -->
  <line x1="24" y1="26" x2="16" y2="6" stroke="#E08A3E" stroke-width="3" stroke-linecap="round" />
  <!-- Barre centrale du A -->
  <line x1="10.5" y1="19" x2="21.5" y2="19" stroke="#E08A3E" stroke-width="2.5" stroke-linecap="round" />
  <!-- Point accent cyan (signature IA) -->
  <circle cx="26" cy="8" r="2.5" fill="#2DD4BF" />
</svg>
