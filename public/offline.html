<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0" />
  <title>Hors ligne — Assami Baga</title>
  <style>
    * { margin: 0; padding: 0;
        box-sizing: border-box; }

    body {
      background: #0B0F14;
      color: #EDEFF2;
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      gap: 16px;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: rgba(224, 138, 62, 0.15);
      border: 2px solid rgba(224, 138, 62, 0.4);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #E08A3E;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      color: #EDEFF2;
      font-weight: 600;
    }

    p {
      color: #8B94A3;
      font-size: 14px;
      max-width: 300px;
      line-height: 1.6;
    }

    a {
      margin-top: 8px;
      display: inline-block;
      padding: 12px 28px;
      background: #E08A3E;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    a:hover { opacity: 0.85; }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      color: #2DD4BF;
      font-size: 11px;
      margin-top: 24px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="logo">A</div>

  <h1>Vous êtes hors ligne</h1>

  <p>
    Cette page n'est pas disponible sans connexion.
    Les sections principales du portfolio
    sont accessibles depuis le cache.
  </p>

  <a href="/">Retour à l'accueil</a>

  <p class="mono">assami.dev</p>
</body>
</html>
